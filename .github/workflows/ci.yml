name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check:
    name: 全量检查
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Docs First 检查
        run: node scripts/check-docs.mjs

      - name: 架构分层约束
        run: node scripts/check-arch.mjs

      - name: ESLint
        run: pnpm lint

      - name: 类型检查
        run: pnpm -r exec tsc --noEmit

      - name: 单元测试
        run: pnpm test
