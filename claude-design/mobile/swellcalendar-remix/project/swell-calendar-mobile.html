<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-accent="seafoam">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>swell-calendar · 移动端</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="spectrum-tokens.css" />
<link rel="stylesheet" href="mobile.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: oklch(0.92 0.004 270);
    display: grid; place-items: center; overflow: hidden;
    font-family: var(--sp-font);
  }
  [data-theme="dark"] body { background: oklch(0.16 0.004 270); }
  #stage { display: grid; place-items: center; }
  #root { transform: scale(var(--fit, 1)); transform-origin: center center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mobile-views.jsx"></script>
<script type="text/babel" src="mobile-app.jsx"></script>
<script>
  // fit the 402×874 device to the viewport
  function fit() {
    const margin = 28;
    const s = Math.min((window.innerWidth - margin) / 402, (window.innerHeight - margin) / 874, 1);
    document.documentElement.style.setProperty("--fit", s);
  }
  window.addEventListener("resize", fit);
  fit();
</script>
</body>
</html>
